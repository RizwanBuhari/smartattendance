# Dashboard (React build served by nginx).
#
# Note: the dashboard talks to the backend FROM THE BROWSER, not from inside the
# cluster — so it uses whatever URL was baked into the image at build time
# (VITE_API_BASE_URL=http://localhost:3000). That is why README.md port-forwards
# the backend to 3000: it makes the existing image work with no rebuild.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: smartattendance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: smartattendance-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "300m"
---
# LoadBalancer so Docker Desktop automatically maps the service to localhost on the Windows host.
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: smartattendance
spec:
  type: LoadBalancer
  selector:
    app: dashboard
  ports:
    - port: 30080
      targetPort: 80
