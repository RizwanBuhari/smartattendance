# Backend (NestJS API).
#
# Two secrets must exist BEFORE applying this (see k8s/README.md):
#   • backend-env — the contents of backend/.env, injected as env vars
#   • backend-key — serviceAccountKey.json, mounted as a file at /app
# Neither is stored in this repo, which is why they are created by command.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: smartattendance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: smartattendance-backend:latest
          # Use the image already built locally by docker compose. Docker
          # Desktop's Kubernetes shares the local image store, so there is no
          # registry to push to. (In a cloud cluster this would be "Always"
          # against a real registry.)
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            # Resolves to the Redis Service defined in 01-redis.yaml.
            - name: REDIS_URL
              value: redis://redis:6379
          envFrom:
            # Every KEY=VALUE from backend/.env becomes an environment variable.
            - secretRef:
                name: backend-env
          volumeMounts:
            # main.ts loads ./serviceAccountKey.json and WORKDIR is /app, so the
            # key has to land at exactly this path. subPath mounts the single
            # file instead of replacing the whole /app directory.
            - name: sa-key
              mountPath: /app/serviceAccountKey.json
              subPath: serviceAccountKey.json
              readOnly: true
          # Both probes hit "/" (AppController.getHello) which returns a string
          # with NO I/O.
          #
          # Deliberately NOT /health: that endpoint queries Firestore, and a cold
          # Firestore call can take ~4.5s while the probe default timeout is 1s.
          # Kubernetes would then kill a perfectly healthy app — a slow external
          # dependency must never be able to trigger a restart loop. Liveness
          # answers "is this process alive?", nothing more.
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
      volumes:
        - name: sa-key
          secret:
            secretName: backend-key
---
# NodePort, not ClusterIP or LoadBalancer: the mobile app runs on a phone, so
# the API has to be reachable from the LAN. A NodePort is published on the host
# itself and stays up across pod restarts — unlike `kubectl port-forward`, which
# binds only to localhost and dies whenever the pod is replaced. Docker
# Desktop's LoadBalancer maps to localhost only, which a phone cannot reach.
#
# Reachable at  http://<this-machine's-LAN-IP>:30300
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: smartattendance
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 30300
      targetPort: 3000
      nodePort: 30300
