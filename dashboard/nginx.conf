# Serves the built React app and makes deep links work: any path that isn't a
# real file falls back to index.html so React Router can handle it client-side.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache the hashed build assets aggressively; they change name on rebuild.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
